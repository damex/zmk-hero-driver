description: |
  Logitech HERO mouse optical sensor (reverse-engineered).
  SPI mode 3, 4 MHz. HERO has no dedicated motion-ready line (MISO doubles as
  the motion/wake pin), so this driver polls at the configured rate.

compatible: "logitech,hero"

include: spi-device.yaml

properties:
  cpi:
    type: int
    default: 1000
    description: "Resolution in CPI. Range 50-12000, step 50."
  poll-rate-hz:
    type: int
    default: 1000
    description: |
      Motion poll rate in Hz. Clamped to 10000 (100 us SPI floor); intermediate
      values that don't divide cleanly into microseconds are rounded down.
  min-frame-rate-hz:
    type: int
    default: 1000
    description: "Frame-rate floor when idle. Range ~32-8333 Hz, 20 us step."
  run-to-rest-sec:
    type: int
    default: 6
    description: "Seconds of inactivity before the sensor enters low-power rest mode."
  swap-xy:
    type: boolean
    description: "Swap X and Y axes at report time."
  invert-x:
    type: boolean
    description: "Negate X axis at report time."
  invert-y:
    type: boolean
    description: "Negate Y axis at report time."
  event-type:
    type: int
    required: true
    description: "input event type to report, e.g. INPUT_EV_REL."
  x-input-code:
    type: int
    required: true
    description: "input code for the X axis, e.g. INPUT_REL_X."
  y-input-code:
    type: int
    required: true
    description: "input code for the Y axis, e.g. INPUT_REL_Y."
